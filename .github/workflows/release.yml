name: Build and Release

on:
  push:
    branches: [master, refactor]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  # install-qt-action v4 defaults to this well-tested Qt 6 LTS patch.
  QT_VERSION: '6.8.3'
  QT_MODULES: 'qt5compat qtserialport qtconnectivity'
  CMAKE_BUILD_PARALLEL_LEVEL: '2'

jobs:
  windows:
    name: Windows 2022 / MSVC x64
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: ${{ env.QT_MODULES }}
          cache: true

      - name: Configure
        run: cmake -S . -B build -A x64 -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure

      - name: Stage application
        shell: pwsh
        run: |
          cmake --install build --config Release --prefix stage
          windeployqt --release --compiler-runtime stage/bin/SerialTest.exe
          Copy-Item README.md, LICENSE.MIT, LICENSE.GPL -Destination stage
          Compress-Archive -Path stage/* -DestinationPath SerialTest-Windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SerialTest-Windows-x64
          path: SerialTest-Windows-x64.zip
          if-no-files-found: error

  linux:
    name: Ubuntu 22.04 / GCC x64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            build-essential \
            cmake \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libxkbcommon-dev

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: ${{ env.QT_MODULES }}
          cache: true

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Stage application
        run: |
          cmake --install build --prefix stage
          cp README.md LICENSE.MIT LICENSE.GPL stage/
          tar -C stage -czf SerialTest-Linux-x86_64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SerialTest-Linux-x86_64
          path: SerialTest-Linux-x86_64.tar.gz
          if-no-files-found: error

  macos:
    name: macOS 14 / Apple Clang
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          modules: ${{ env.QT_MODULES }}
          cache: true

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Stage application
        run: |
          cmake --install build --prefix stage
          macdeployqt stage/SerialTest.app -always-overwrite -dmg
          mv stage/SerialTest.dmg SerialTest-macOS.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SerialTest-macOS
          path: SerialTest-macOS.dmg
          if-no-files-found: error

  release:
    name: Publish tagged release
    needs: [windows, linux, macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
